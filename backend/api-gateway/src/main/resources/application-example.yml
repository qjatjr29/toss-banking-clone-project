server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: account-service
              uri: http://{ACCOUNT_SERVICE}:{ACCOUNT_PORT}
              predicates:
                - Path=/api/v1/accounts/**
            - id: transfer-service
              uri: http://{TRANSFER_SERVICE}:{TRANSFER_PORT}
              predicates:
                - Path=/api/v1/transfer/**mak